use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET_KEY}"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  ban_time_on_fail: 30
  max_ban_time_on_fail: 120
  formats:
    - html
    - json

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 12.0
  useragent_suffix: "openclaw-search"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
    weight: 1.5

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    weight: 1.2

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    weight: 1.0

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    weight: 1.0

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
    weight: 1.3

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
    weight: 1.2
    categories: general

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false
    weight: 1.0

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: false
    weight: 0.8

  - name: presearch
    engine: presearch
    shortcut: ps
    disabled: false
    weight: 0.7

  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false
    weight: 1.0

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
    weight: 0.8

  - name: wikidata
    engine: wikidata
    disabled: true

  - name: currency
    engine: currency_convert
    disabled: true

  - name: dictzone
    disabled: true

  - name: libretranslate
    disabled: true
